version: "3.8"

services:
  db:
    image: mysql:5.7
    container_name: staffportal_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: staffportal
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - staffportal_net

  wordpress:
    build:
      context: ./wordpress
    container_name: staffportal_web
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: staffportal
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wp_data:/var/www/html
    networks:
      - staffportal_net

  # One-shot container that waits for WordPress + DB, then provisions
  # the whole lab (admin/staff accounts, plugin activation, backup
  # file, permalinks, etc.) using wp-cli. It exits once done.
  setup:
    build:
      context: ./wordpress
    container_name: staffportal_setup
    depends_on:
      - wordpress
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: staffportal
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
    volumes:
      - wp_data:/var/www/html
      - ./seed:/seed:ro
      - ./scripts:/scripts:ro
    entrypoint: ["bash", "/scripts/wp-setup.sh"]
    networks:
      - staffportal_net

networks:
  staffportal_net:
    driver: bridge

volumes:
  db_data:
  wp_data:
